<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Tailwind CDN -->

  <script>

      theme: {
        extend: {
          fontFamily: {
            heading: ["'Instrument Serif'", "serif"],

  <!-- Liquid-glass design system -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; font-family: 'Barlow', sans-serif; background: #000; color: #fff; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

  <!-- Babel standalone -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion;</script>

<body class="bg-black">
  <div id="root"></div>

  <script type="text/babel">
    /* ── Suppress benign Framer Motion key warnings ── */
    const _origErr = console.error;
    console.error = (...a) => {
      if (typeof a[0] === "string" && a[0].includes("unique \"key\"")) return;
      _origErr.apply(console, a);
    };

    const { motion } = Motion;
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════
       ICONS
    ═══════════════════════════════════════════════ */
    const ArrowUpRight = ({ className }) => (

        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={className}>
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    );

    const PlayIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="currentColor" className={className}>
        <polygon points="6,4 20,12 6,20" />
      </svg>
    );

    const ClockIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
        className={className}>
        <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
      </svg>
    );

    const GlobeIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
        className={className}>
        <circle cx="12" cy="12" r="10" />
        <line x1="2" y1="12" x2="22" y2="12" />
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z" />
      </svg>
    );

    const ImageIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}>
        <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z" />
      </svg>
    );

    const MovieIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}>
        <path d="M4 6.47V18c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V6.47L18.52 10H16l2-4h-2l-2 4h-2l2-4h-2l-2 4H8l2-4H7L5 6.47H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16V4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z" />
      </svg>
    );

    const LightbulbIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}>
        <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z" />
      </svg>
    );

    /* ═══════════════════════════════════════════════
       FADING VIDEO (rAF-driven crossfade, NO CSS transitions)
    ═══════════════════════════════════════════════ */
    const FadingVideo = ({ src, className, style }) => {
      const videoRef = useRef(null);
      const rafIdRef = useRef(null);
      const fadingOutRef = useRef(false);
      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      const fadeTo = useCallback((target, duration = FADE_MS) => {
        if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
        const video = videoRef.current;
        if (!video) return;
        const startTime = performance.now();
        const from = parseFloat(video.style.opacity) || 0;

        const step = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          video.style.opacity = from + (target - from) * progress;
          if (progress < 1) {
            rafIdRef.current = requestAnimationFrame(step);
          }
        };
        rafIdRef.current = requestAnimationFrame(step);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoadedData = () => {
          video.style.opacity = "0";
          video.play().catch(() => {});
          fadeTo(1);
        };

        const onTimeUpdate = () => {
          if (
            !fadingOutRef.current &&
            video.duration - video.currentTime <= FADE_OUT_LEAD &&
            video.duration - video.currentTime > 0
          ) {
            fadingOutRef.current = true;
            fadeTo(0);
          }
        };

        const onEnded = () => {
          video.style.opacity = "0";
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoadedData);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return () => {
          if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
          video.removeEventListener("loadeddata", onLoadedData);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, [fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    };

    /* ═══════════════════════════════════════════════
       BLUR TEXT (word-by-word blur-in via IntersectionObserver)
    ═══════════════════════════════════════════════ */
    const BlurText = ({ text, className }) => {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setInView(true); observer.disconnect(); } },
          { threshold: 0.1 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={
                inView
                  ? {
                      filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    };

    /* ═══════════════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════════════ */
    const Navbar = () => (
      <nav className="fixed top-4 left-0 right-0 px-8 lg:px-16 z-50 flex items-center justify-between">
        {/* Logo */}
        <div className="liquid-glass w-12 h-12 rounded-full flex items-center justify-center">
          <span className="font-heading italic text-white text-xl leading-none">a</span>
        </div>

        {/* Center nav — desktop only */}
        <div className="hidden lg:flex items-center liquid-glass rounded-full px-1.5 py-1.5">
          {["Home", "Voyages", "Worlds", "Innovation", "Plan Launch"].map((item) => (
            <a key={item} href="#" className="px-3 py-2 text-sm font-medium text-white/90 font-body hover:text-white transition-colors">
              {item}
            </a>
          ))}
          <button className="bg-white text-black rounded-full px-4 py-2 text-sm font-medium font-body whitespace-nowrap flex items-center gap-1.5 ml-1">
            Claim a Spot <ArrowUpRight className="h-4 w-4" />
          </button>
        </div>

        {/* Spacer to balance logo */}
        <div className="w-12 h-12" />
      </nav>
    );

    /* ═══════════════════════════════════════════════
       SECTION 1 — HERO
    ═══════════════════════════════════════════════ */
    const HeroSection = () => {
      const fadeIn = (delay) => ({
        initial: { filter: "blur(10px)", opacity: 0, y: 20 },
        animate: { filter: "blur(0px)", opacity: 1, y: 0 },
        transition: { duration: 0.8, delay, ease: "easeOut" },
      });

      return (
        <section className="relative min-h-screen bg-black overflow-hidden">
          {/* Background video — 120% scale, top-aligned */}
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: "120%", height: "120%" }}
          />

          {/* Content layer */}
          <div className="relative z-10 flex flex-col min-h-screen">
            {/* Navbar lives here but is fixed */}
            <Navbar />

            {/* Hero content — centered */}
            <div className="flex-1 flex flex-col items-center justify-center pt-24 px-4 text-center">
              {/* Badge */}
              <motion.div {...fadeIn(0.4)} className="liquid-glass rounded-full flex items-center gap-2 pr-3 mb-8">
                <span className="bg-white text-black rounded-full px-3 py-1 text-xs font-semibold font-body">New</span>
                <span className="text-sm text-white/90 font-body">Maiden Crewed Voyage to Mars Arrives 2026</span>
              </motion.div>

              {/* Headline — word-by-word blur */}
              <BlurText
                text="Venture Past Our Sky Across the Universe"
                className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl tracking-[-4px]"
              />

              {/* Subheading */}
              <motion.p
                {...fadeIn(0.8)}
                className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight"
              >
                Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough
                engineering bring deep-space exploration within reach—secure and extraordinary.
              </motion.p>

              {/* CTAs */}
              <motion.div {...fadeIn(1.1)} className="flex items-center gap-6 mt-6">
                <button className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white font-body flex items-center gap-2">
                  Start Your Voyage <ArrowUpRight className="h-5 w-5" />
                </button>
                <button className="text-white text-sm font-medium font-body flex items-center gap-2 hover:opacity-80 transition-opacity">
                  View Liftoff <PlayIcon className="h-4 w-4" />
                </button>
              </motion.div>

              {/* Stats row */}
              <motion.div {...fadeIn(1.3)} className="flex items-stretch gap-4 mt-8">
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col items-start">
                  <ClockIcon className="text-white w-7 h-7" />
                  <div className="mt-auto pt-4">
                    <span className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">34.5 Min</span>
                    <p className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</p>
                  </div>
                </div>
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col items-start">
                  <GlobeIcon className="text-white w-7 h-7" />
                  <div className="mt-auto pt-4">
                    <span className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">2.8B+</span>
                    <p className="text-xs text-white font-body font-light mt-2">Users Across the Globe</p>
                  </div>
                </div>
              </motion.div>
            </div>

            {/* Partners — bottom of hero */}
            <motion.div {...fadeIn(1.4)} className="flex flex-col items-center gap-4 pb-8">
              <span className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white font-body">
                Collaborating with top aerospace pioneers globally
              </span>
              <div className="flex items-center gap-12 md:gap-16">
                {["Aeon", "Vela", "Apex", "Orbit", "Zeno"].map((name) => (
                  <span key={name} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">
                    {name}
                  </span>
                ))}
              </div>
            </motion.div>
          </div>
        </section>
      );
    };

    /* ═══════════════════════════════════════════════
       SECTION 2 — CAPABILITIES
    ═══════════════════════════════════════════════ */
    const capCards = [
      {
        icon: <ImageIcon className="h-6 w-6 text-white" />,
        tags: ["Natural Context", "Photo Realism", "Infinite Settings", "Eco-Vibe"],
        title: "AI Scenery",
        body: "AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.",
      },
      {
        icon: <MovieIcon className="h-6 w-6 text-white" />,
        tags: ["Scale Fast", "Visual Consistency", "Time Saver", "Ready to Post"],
        title: "Batch Production",
        body: "Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.",
      },
      {
        icon: <LightbulbIcon className="h-6 w-6 text-white" />,
        tags: ["Ray Tracing", "Physical Shadows", "Studio Quality", "Sunlight Sync"],
        title: "Smart Lighting",
        body: "Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.",
      },
    ];

    const CapabilitiesSection = () => (
      <section className="relative min-h-screen bg-black overflow-hidden">
        {/* Background video — full-bleed */}
        <FadingVideo
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
          className="absolute inset-0 w-full h-full object-cover z-0"
        />

        {/* Content */}
        <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
          {/* Header */}
          <div className="mb-auto">
            <p className="text-sm font-body text-white/80 mb-6">// Capabilities</p>
            <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
              Production<br />evolved
            </h2>
          </div>

          {/* Three cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
            {capCards.map((card, idx) => (
              <motion.div
                key={idx}
                initial={{ filter: "blur(8px)", opacity: 0, y: 30 }}
                whileInView={{ filter: "blur(0px)", opacity: 1, y: 0 }}
                viewport={{ once: true, amount: 0.2 }}
                transition={{ duration: 0.7, delay: idx * 0.15, ease: "easeOut" }}
                className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col"
              >
                {/* Top row */}
                <div className="flex items-start justify-between gap-4">
                  {/* Icon box */}
                  <div className="liquid-glass w-11 h-11 rounded-[0.75rem] flex items-center justify-center shrink-0">
                    {card.icon}
                  </div>
                  {/* Tags */}
                  <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                    {card.tags.map((tag) => (
                      <span key={tag} className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">
                        {tag}
                      </span>
                    ))}
                  </div>
                </div>

                {/* Spacer */}
                <div className="flex-1" />

                {/* Bottom */}
                <div className="mt-6">
                  <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">
                    {card.title}
                  </h3>
                  <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">
                    {card.body}
                  </p>
                </div>
              </motion.div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ═══════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════ */
    const App = () => (
      <div>
        <HeroSection />
        <CapabilitiesSection />
      </div>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
